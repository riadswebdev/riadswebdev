name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the latest version to avoid Node.js compatibility issues
          fetch-depth: 0
      
      - uses: Platane/snk@v3
        with:
          github_user_name: riadswebdev
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.svg?palette=github-light
      
      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4  # Updated to v4 for Node.js 20+ compatibility
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true  # Clean deployment
